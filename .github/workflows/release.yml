name: Release macOS packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.5.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build DMG and app zip
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            if [[ ! "$TAG" =~ ^v[0-9]+ ]]; then
              echo "::error::Release tag must start with v, for example v1.5.0"
              exit 1
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: |
          sw_vers
          swift --version
          xcodebuild -version

      - name: Import Apple signing certificate if configured
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE_BASE64:-}" ]; then
            echo "No Apple signing certificate configured; release will be ad-hoc signed."
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-typeno-ci-keychain}"

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "${APPLE_CERTIFICATE_PASSWORD:-}" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build release packages
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./scripts/package_release.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TypeNo-macOS-${{ steps.release-tag.outputs.tag }}
          path: |
            dist/TypeNo.dmg
            dist/TypeNo.app.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          NOTES="TypeNo ${RELEASE_TAG} macOS release.

          Assets:
          - TypeNo.dmg: recommended installer for most users
          - TypeNo.app.zip: zipped app bundle"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/TypeNo.dmg dist/TypeNo.app.zip --clobber
          else
            if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
              gh release create "$RELEASE_TAG" \
                dist/TypeNo.dmg \
                dist/TypeNo.app.zip \
                --title "TypeNo ${RELEASE_TAG}" \
                --notes "$NOTES" \
                --target "$GITHUB_SHA"
            else
              gh release create "$RELEASE_TAG" \
                dist/TypeNo.dmg \
                dist/TypeNo.app.zip \
                --title "TypeNo ${RELEASE_TAG}" \
                --notes "$NOTES"
            fi
          fi
